name: Frontend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build-deploy:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: frontend

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Clean Old Deployment
        run: |
          if exist D:\Deploy\frontend rmdir /s /q D:\Deploy\frontend

      - name: Deploy New Build
        run: |
          xcopy /E /I /Y dist D:\Deploy\frontend